<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Haiku — Overlay Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #00A86B;
    --azul: #014751;
    --negro: #000000;
    --hueso: #F5F7F2;
    --gris: #393939;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    color: var(--hueso);
    overflow: hidden;
  }

  /* Lienzo simulando una transmisión real */
  body {
    background: #0a0a0a;
    position: relative;
  }

  /* Fondo simulado (cambia con el toggle) */
  .canvas {
    position: fixed;
    inset: 0;
    transition: background 0.4s ease;
  }
  .canvas.dark {
    background:
      radial-gradient(circle at 30% 30%, rgba(0,168,107,0.12), transparent 50%),
      radial-gradient(circle at 70% 70%, rgba(1,71,81,0.18), transparent 50%),
      linear-gradient(135deg, #0d1011 0%, #161a1c 100%);
  }
  .canvas.video {
    background-image: url('https://images.unsplash.com/photo-1573164574572-cb89e39749b4?w=1920&q=80');
    background-size: cover;
    background-position: center;
  }
  .canvas.light {
    background: linear-gradient(135deg, #e8e8e6 0%, #c9cdc9 100%);
  }

  /* Indicador "OBS Preview" arriba */
  .meta-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 14px 24px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(20px);
    color: var(--hueso);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    border-bottom: 1px solid rgba(0,168,107,0.3);
  }
  .meta-bar .left {
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .meta-bar .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--verde);
    box-shadow: 0 0 12px var(--verde);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.4;} }

  .meta-bar button {
    background: var(--verde);
    color: var(--negro);
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .meta-bar button:hover { transform: translateY(-1px); }
  .meta-bar select {
    background: rgba(255,255,255,0.05);
    color: var(--hueso);
    border: 1px solid rgba(245,247,242,0.2);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
  }

  /* ================================
     OVERLAY HAIKU — el componente real
     ================================ */
  .haiku-overlay {
    position: fixed;
    bottom: 60px;
    left: 60px;
    max-width: 720px;
    z-index: 50;
  }

  .haiku-card {
    position: relative;
    display: flex;
    gap: 22px;
    align-items: flex-start;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(28px) saturate(140%);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    border-radius: 0 18px 18px 0;
    padding: 28px 36px 28px 28px;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.6),
      0 0 0 1px rgba(245,247,242,0.04) inset;
    animation: haikuEnter 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  /* Barra estructural verde — línea del haiku */
  .haiku-card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: var(--verde);
    box-shadow: 0 0 24px rgba(0,168,107,0.5);
  }

  /* Avatar */
  .haiku-avatar {
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--azul), var(--verde));
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--hueso);
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 22px;
    text-transform: uppercase;
    border: 2px solid var(--verde);
    box-shadow: 0 0 0 4px rgba(0,168,107,0.15);
    overflow: hidden;
  }
  .haiku-avatar img {
    width: 100%; height: 100%; object-fit: cover;
  }

  /* Contenido del mensaje */
  .haiku-content {
    flex: 1;
    min-width: 0;
    padding-right: 8px;
  }

  .haiku-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .haiku-name {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--verde);
    text-transform: uppercase;
    letter-spacing: 1.8px;
  }

  .haiku-platform {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(0, 168, 107, 0.12);
    border: 1px solid rgba(0, 168, 107, 0.3);
    color: var(--verde);
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .haiku-platform svg {
    width: 10px; height: 10px;
  }

  /* Pequeña línea estructural — homenaje al haiku */
  .haiku-line {
    width: 24px;
    height: 1.5px;
    background: var(--verde);
    margin: 0 0 10px 0;
    opacity: 0.6;
  }

  .haiku-message {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 22px;
    line-height: 1.45;
    color: var(--hueso);
    letter-spacing: -0.1px;
    word-wrap: break-word;
  }

  /* Animación de entrada */
  @keyframes haikuEnter {
    0% {
      opacity: 0;
      transform: translateX(-30px);
      filter: blur(6px);
    }
    100% {
      opacity: 1;
      transform: translateX(0);
      filter: blur(0);
    }
  }

  /* Animación de salida */
  .haiku-overlay.exiting .haiku-card {
    animation: haikuExit 0.4s cubic-bezier(0.4, 0, 1, 1) forwards;
  }
  @keyframes haikuExit {
    to {
      opacity: 0;
      transform: translateX(-20px);
      filter: blur(4px);
    }
  }

  /* Pequeño badge "MENSAJE DESTACADO" arriba */
  .haiku-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--verde);
    color: var(--negro);
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 10px;
    transform: translateY(-4px);
  }
</style>
</head>
<body>

<div class="canvas dark" id="canvas"></div>

<div class="meta-bar">
  <div class="left">
    <span class="dot"></span>
    <strong style="font-family:'Poppins',sans-serif;font-weight:600;">Haiku Overlay — Preview</strong>
    <span style="opacity:0.5;">|</span>
    <span style="opacity:0.7;">Cierra esta barra en producción</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <select id="bg-select">
      <option value="dark">Fondo oscuro</option>
      <option value="video">Fondo foto/video</option>
      <option value="light">Fondo claro</option>
    </select>
    <select id="msg-select">
      <option value="0">Mensaje corto</option>
      <option value="1">Mensaje medio</option>
      <option value="2">Mensaje largo</option>
      <option value="3">Pregunta</option>
    </select>
    <button id="replay">↻ Re-animar</button>
  </div>
</div>

<div class="haiku-overlay" id="overlay">
  <div class="haiku-card" id="card">
    <div class="haiku-avatar" id="avatar">M</div>
    <div class="haiku-content">
      <div class="haiku-meta">
        <span class="haiku-name" id="name">María Fernanda</span>
        <span class="haiku-platform">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2c-.3-1-1.1-1.8-2.1-2.1C19.6 3.6 12 3.6 12 3.6s-7.6 0-9.4.5c-1 .3-1.8 1.1-2.1 2.1C0 8 0 12 0 12s0 4 .5 5.8c.3 1 1.1 1.8 2.1 2.1 1.8.5 9.4.5 9.4.5s7.6 0 9.4-.5c1-.3 1.8-1.1 2.1-2.1.5-1.8.5-5.8.5-5.8s0-4-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
          YouTube
        </span>
      </div>
      <div class="haiku-line"></div>
      <p class="haiku-message" id="message">¿Cómo funciona Haiku para mi negocio de servicios?</p>
    </div>
  </div>
</div>

<script>
  const messages = [
    { name: "Carlos Mendoza", initial: "C", text: "Genial el contenido 🙌" },
    { name: "María Fernanda", initial: "M", text: "¿Cómo funciona Haiku para mi negocio de servicios?" },
    { name: "Diego Ramírez", initial: "D", text: "Llevo dos meses usando Haiku y mis ventas subieron 40%. La automatización de WhatsApp fue lo que cambió todo el proceso para mi equipo." },
    { name: "Ana Castillo", initial: "A", text: "¿Es necesario tener n8n para empezar o solo con la plataforma básica está bien?" }
  ];

  const canvas = document.getElementById('canvas');
  const card = document.getElementById('card');
  const overlay = document.getElementById('overlay');
  const nameEl = document.getElementById('name');
  const avatarEl = document.getElementById('avatar');
  const msgEl = document.getElementById('message');

  function replay() {
    card.style.animation = 'none';
    card.offsetHeight; // trigger reflow
    card.style.animation = '';
  }

  document.getElementById('replay').addEventListener('click', replay);

  document.getElementById('bg-select').addEventListener('change', (e) => {
    canvas.className = 'canvas ' + e.target.value;
  });

  document.getElementById('msg-select').addEventListener('change', (e) => {
    const m = messages[parseInt(e.target.value)];
    nameEl.textContent = m.name;
    avatarEl.textContent = m.initial;
    msgEl.textContent = m.text;
    replay();
  });

  // Iniciar con mensaje pregunta (medio)
  document.getElementById('msg-select').value = "1";
</script>
</body>
</html>
